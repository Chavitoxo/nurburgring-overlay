<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<title>Nürburgring Overlay</title>

</head>

<body style="padding:10px;">

<div id="leaderboard">

    <div id="rightpanel">

        <div class="sessionbox">

            <div class="sessiontitle">

                TIME

                <span id="dayicon">
                    ☀️
                </span>

            </div>

            <div id="timebox">

                <div id="clock">
                    00:00:00
                </div>

            </div>

        </div>

        <div class="weatherbox">

            <div class="weathertitle">
                TRACK STATUS
            </div>

            <div class="weatherinfo">
                🌤️ Dry
            </div>

            <div class="weatherinfo">
                🌡️ Track Temp: 19°C
            </div>

            <div class="weatherinfo">
                🌬️ Air Temp: 24°C
            </div>

            <div class="weatherinfo">
                💨 Wind: 0 km/h
            </div>

            <div class="weatherinfo">
                💧 Humidity: 0%
            </div>

        </div>

        <div class="trackmap">

            <div class="tracktitle">
                TRACK MAP
            </div>

            <img src="track.png" id="trackimg">

            <img src="nurburgring-logo.png" id="tracklogo">

        </div>

    </div>

    <div class="titlebar">

    <div class="titleleft">

        <div class="serieswrapper">

    <div class="series">
        ADAC RAVENOL 24H NÜRBURGRING
    </div>

    <div id="longdate">
        SATURDAY, MAY 16 2026
    </div>

</div>

    </div>

    <div class="titlecenter">

        <div class="infobox">

            <div class="infotitle">
                SESSION
            </div>

            <div class="infovalue" id="sessiontype">
                RACE
            </div>

        </div>

        <div class="infobox">

            <div class="infotitle">
                TIME TO END
            </div>

            <div class="infovalue" id="sessiontime">
                00:00:00
            </div>

        </div>

        <div class="infobox">

            <div class="infotitle">
                TRACK STATE
            </div>

            <div class="infovalue" id="trackstate">
                GREEN
            </div>

        </div>

    </div>

    <div class="live">
        ● LIVE
    </div>

</div>

<div class="header">

    <div>POS</div>
    <div>NO.</div>
    <div>STATE</div>
    <div>CLASS</div>
    <div>PILOTO</div>
    <div>LAPS</div>
    <div>GAP</div>
    <div>LAST</div>
    <div>FASTEST</div>
    <div>PIT</div>
    <div>VEHICLE</div>

</div>

    <div id="rows"></div>

</div>

<script src="script.js"></script>

</body>
</html>
