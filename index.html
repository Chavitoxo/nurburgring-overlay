<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="leaderboard">

    <div id="rightpanel">

        <div class="sessionbox">

            <div class="sessiontitle">

                TIME <span id="dayicon">🌙</span>

            </div>

            <div id="timebox">

                <div id="clock">
                    00:00:00
                </div>

            </div>

        </div>

        <div class="weatherbox">

            <div class="weathertitle">
                TRACK STATUS
            </div>

            <div class="weatherinfo">
                🌤️ Dry
            </div>

            <div class="weatherinfo">
                🌡️ Track Temp: 19°C
            </div>

            <div class="weatherinfo">
                💨 Air Temp: 24°C
            </div>

            <div class="weatherinfo">
                💧 Humidity: 0%
            </div>

        </div>

        <div class="trackmap">

            <img src="track.png" id="trackimg">

            <div id="trackdots"></div>

        </div>

    </div>

    <div class="titlebar">

        <div class="series">
            ADAC RAVENOL 24H NÜRBURGRING
        </div>

        <div class="live">
            ● LIVE
        </div>

    </div>

    <div class="header">

        <div>P</div>
        <div>TEAM</div>
        <div>PILOTO</div>
        <div>LAPS</div>
        <div>BEST</div>
        <div>GAP</div>

    </div>

    <div id="rows"></div>

</div>

<script src="script.js"></script>

</body>
</html>
